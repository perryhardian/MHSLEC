services:
  postgres:
    image: postgres:16-alpine
    container_name: student-financial-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: student_financial_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d student_financial_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    container_name: student-financial-tracker-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/student_financial_tracker
      JWT_ACCESS_SECRET: local-docker-access-secret-at-least-32-chars
      JWT_REFRESH_SECRET: local-docker-refresh-secret-at-least-32-chars
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ""
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
